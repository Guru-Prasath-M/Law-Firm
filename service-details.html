<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Details | MS Law Firm</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Georgia, serif;
        }

        body{
            background:#f8f8f8;
            color:#333;
        }

        /* Banner */

        .banner{
            background:#02026b;
            color:#fff;
            text-align:center;
            padding:40px 20px;
        }

        .banner h1{
            font-size:3rem;
            margin-bottom:10px;
        }

        .banner p{
            font-size:1.2rem;
            color:#d4af37;
        }

        /* Content */

        .container{
            width:90%;
            max-width:1200px;
            margin:60px auto;
        }

        .service-details{
            background:#fff;
            border-radius:15px;
            padding:50px;
            box-shadow:0 5px 20px rgba(0,0,0,0.08);
        }

        .service-details h2{
            color:#02026b;
            margin-bottom:20px;
            font-size:2rem;
        }

        .service-details p{
            line-height:1.8;
            margin-bottom:30px;
            font-size:1.1rem;
        }

        .service-details ul{
            padding-left:20px;
        }

        .service-details ul li{
            margin-bottom:12px;
            font-size:1.05rem;
        }

        .back-btn{
            display:inline-block;
            margin-top:40px;
            background:#d4af37;
            color:#000;
            text-decoration:none;
            padding:12px 25px;
            border-radius:5px;
            transition:.3s;
        }

        .back-btn:hover{
            background:#02026b;
            color:#fff;
        }

        @media(max-width:768px){

            .banner{
                padding:80px 20px;
            }

            .banner h1{
                font-size:2rem;
            }

            .service-details{
                padding:30px;
            }
        }
    </style>
</head>

<body>

    <!-- Banner -->
    <section class="banner">
        <h1 id="serviceTitle">Service Details</h1>
        <p>Professional Legal Services Tailored To Your Needs</p>
    </section>

    <!-- Content -->
    <div class="container">

        <div class="service-details">

            <h2>About This Service</h2>

            <p id="serviceDescription"></p>

            <h2>What We Offer</h2>

            <ul id="serviceFeatures"></ul>

            <a href="index.html#services" class="back-btn">
                ← Back to Services
            </a>

        </div>

    </div>

    <script>

        const services = {

            "corporate-law": {
                title: "Corporate Law",
                description:
                "We provide comprehensive legal solutions for businesses, startups, partnerships, and corporations. Our services help organizations remain compliant while supporting growth and protecting business interests.",
                features: [
                    "Business Registration",
                    "Corporate Compliance",
                    "Commercial Contracts",
                    "Company Incorporation",
                    "Legal Risk Management"
                ]
            },

            "civil-litigation": {
                title: "Civil Litigation",
                description:
                "Our litigation team represents clients in civil disputes before courts and tribunals. We focus on achieving practical and effective solutions while protecting our clients' rights.",
                features: [
                    "Property Disputes",
                    "Recovery Suits",
                    "Consumer Complaints",
                    "Contract Disputes",
                    "Court Representation"
                ]
            },

            "family-law": {
                title: "Family Law",
                description:
                "We provide compassionate legal assistance for family-related matters, helping clients navigate sensitive issues with confidence and professionalism.",
                features: [
                    "Divorce Proceedings",
                    "Child Custody Matters",
                    "Maintenance Claims",
                    "Adoption Services",
                    "Family Settlements"
                ]
            },

            "property-law": {
                title: "Property Law",
                description:
                "Our property law services cover real estate transactions, title verification, documentation, registration, and dispute resolution.",
                features: [
                    "Property Registration",
                    "Title Verification",
                    "Land Disputes",
                    "Property Documentation",
                    "Real Estate Advisory"
                ]
            },

            "arbitration-mediation": {
                title: "Arbitration & Mediation",
                description:
                "We assist clients in resolving disputes efficiently through arbitration, mediation, and negotiated settlements without lengthy court proceedings.",
                features: [
                    "Commercial Arbitration",
                    "Mediation Services",
                    "Settlement Agreements",
                    "Alternative Dispute Resolution",
                    "Negotiation Support"
                ]
            },

            "legal-advisory": {
                title: "Legal Advisory",
                description:
                "Our legal advisory services help individuals and businesses make informed decisions while minimizing legal risks and ensuring compliance.",
                features: [
                    "Legal Consultation",
                    "Risk Assessment",
                    "Compliance Guidance",
                    "Contract Review",
                    "Strategic Legal Advice"
                ]
            }

        };

        const params = new URLSearchParams(window.location.search);
        const service = params.get("service");

        const title = document.getElementById("serviceTitle");
        const description = document.getElementById("serviceDescription");
        const features = document.getElementById("serviceFeatures");

        if (services[service]) {

            title.textContent = services[service].title;
            description.textContent = services[service].description;

            services[service].features.forEach(feature => {
                const li = document.createElement("li");
                li.textContent = feature;
                features.appendChild(li);
            });

        } else {

            title.textContent = "Service Not Found";
            description.textContent = "The requested service information is currently unavailable.";

        }

    </script>

</body>
</html>
